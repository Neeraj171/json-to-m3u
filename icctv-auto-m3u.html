<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ICCTV Auto M3U Generator</title>

<style>
    body {
        background: #0d0d0d;
        color: #fff;
        font-family: Arial, sans-serif;
        padding: 20px;
    }
    h1 {
        color: #00eaff;
    }
    button, select, input {
        background: #00eaff;
        color: #000;
        padding: 10px 15px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 16px;
        margin-right: 10px;
        font-weight: bold;
    }
    input, select {
        background: #1e1e1e;
        color: #fff;
        border: 1px solid #00eaff;
        width: 250px;
    }
    pre {
        white-space: pre-wrap;
        background: #1b1b1b;
        padding: 15px;
        border-radius: 8px;
        max-height: 600px;
        overflow-y: auto;
        border-left: 4px solid #00eaff;
    }
</style>
</head>
<body>

<h1>ICCTV Auto-Updating M3U Playlist</h1>

<input type="text" id="search" placeholder="Search Channel..." onkeyup="filterChannels()">
<select id="categoryFilter" onchange="filterChannels()">
    <option value="">All Categories</option>
</select>

<br><br>

<button onclick="downloadM3U()">Download M3U File</button>

<pre id="m3u">Loading playlist...</pre>

<script>
const jsonURL = "https://psplay.indevs.in/icctv/";
let allChannels = [];
let finalM3U = "";

// === AUTO FETCH FUNCTION ===
function fetchM3U() {
    fetch(jsonURL, {
        method: "GET",
        headers: { "Cache-Control": "no-cache" }
    })
    .then(response => response.json())
    .then(data => {
        allChannels = data;

        // Sort (category → name)
        allChannels.sort((a, b) => {
            if ((a.category || '') < (b.category || '')) return -1;
            if ((a.category || '') > (b.category || '')) return 1;
            return a.name.localeCompare(b.name);
        });

        generateM3U(allChannels);
        fillCategoryDropdown();
    })
    .catch(err => {
        document.getElementById("m3u").textContent = "Error fetching JSON: " + err;
    });
}

// === GENERATE M3U FUNCTION ===
function generateM3U(list) {
    let m3u = "#EXTM3U\n";

    list.forEach(item => {
        m3u += `#EXTINF:-1 tvg-logo="${item.logo}" group-title="${item.category || 'Uncategorized'}",${item.name}\n${item.link}\n`;
    });

    finalM3U = m3u;
    document.getElementById("m3u").textContent = m3u;
}

// === CATEGORY DROPDOWN FILL ===
function fillCategoryDropdown() {
    const dropdown = document.getElementById("categoryFilter");
    const categories = [...new Set(allChannels.map(c => c.category).filter(Boolean))];

    dropdown.innerHTML = '<option value="">All Categories</option>';
    categories.forEach(cat => {
        dropdown.innerHTML += `<option value="${cat}">${cat}</option>`;
    });
}

// === SEARCH + FILTER ===
function filterChannels() {
    const searchVal = document.getElementById("search").value.toLowerCase();
    const categoryVal = document.getElementById("categoryFilter").value;

    const filtered = allChannels.filter(ch => {
        const matchSearch = ch.name.toLowerCase().includes(searchVal);
        const matchCategory = categoryVal === "" || ch.category === categoryVal;
        return matchSearch && matchCategory;
    });

    generateM3U(filtered);
}

// === DOWNLOAD M3U ===
function downloadM3U() {
    const blob = new Blob([finalM3U], { type: "audio/x-mpegurl" });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "ICCTV-Auto.m3u";
    link.click();
}

// === AUTO REFRESH EVERY 10 MINUTES ===
setInterval(fetchM3U, 600000);

// Initial Load
fetchM3U();
</script>

</body>
</html>
